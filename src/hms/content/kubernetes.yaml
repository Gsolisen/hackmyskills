questions:
  # ============================================================
  # ORIGINAL 6 QUESTIONS (preserved verbatim)
  # ============================================================

  - id: k8s-pod-lifecycle-001
    type: flashcard
    topic: kubernetes
    tier: L1
    tags: [pods, lifecycle]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    front: "What are the five phases of a Kubernetes Pod lifecycle?"
    back: "Pending -> Running -> Succeeded -> Failed -> Unknown"

  - id: k8s-pod-restart-policy-001
    type: flashcard
    topic: kubernetes
    tier: L1
    tags: [pods, policy]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    front: "What are the three Pod restart policy values?"
    back: "Always (default), OnFailure, Never"

  - id: k8s-deployment-scale-001
    type: flashcard
    topic: kubernetes
    tier: L1
    tags: [deployments]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    front: "What command scales a Deployment to 3 replicas?"
    back: "kubectl scale deployment <name> --replicas=3"

  - id: k8s-kubectl-get-pods-001
    type: command-fill
    topic: kubernetes
    tier: L1
    tags: [kubectl, pods]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    prompt: "List all pods in the 'production' namespace"
    command: "kubectl get pods -n production"
    accept_partial: true

  - id: k8s-crashloop-scenario-001
    type: scenario
    topic: kubernetes
    tier: L2
    tags: [debugging, pods]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    situation: "A pod is stuck in CrashLoopBackOff. The image pulls successfully."
    question: "What is your first diagnostic step?"
    answer: "kubectl logs <pod-name> --previous"
    explanation: "The --previous flag shows logs from the last crashed container, revealing why it exited."

  - id: k8s-etcd-concept-001
    type: explain-concept
    topic: kubernetes
    tier: L2
    tags: [architecture, etcd]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    concept: "etcd in Kubernetes"
    model_answer: "etcd is a distributed key-value store that serves as Kubernetes' backing store for all cluster state. All API server writes go to etcd; only the API server communicates with etcd directly."

  # ============================================================
  # L1 -- Pods/Containers (5 new flashcard + 3 new command-fill)
  # ============================================================

  - id: k8s-pod-multicontainer-001
    type: flashcard
    topic: kubernetes
    tier: L1
    tags: [pods, containers]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    front: "What are the three multi-container Pod design patterns?"
    back: "Sidecar, Ambassador, and Adapter."

  - id: k8s-pod-init-container-001
    type: flashcard
    topic: kubernetes
    tier: L1
    tags: [pods, init-containers]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    front: "What is an init container and when does it run?"
    back: "An init container runs before the main app containers start. It is used for setup tasks like fetching config or waiting for dependencies."

  - id: k8s-pod-qos-001
    type: flashcard
    topic: kubernetes
    tier: L1
    tags: [pods, qos]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    front: "What are the three Quality of Service (QoS) classes for Pods?"
    back: "Guaranteed, Burstable, and BestEffort."

  - id: k8s-pod-probe-types-001
    type: flashcard
    topic: kubernetes
    tier: L1
    tags: [pods, probes]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    front: "What are the three types of health probes in Kubernetes?"
    back: "Liveness probe (restarts unhealthy container), readiness probe (controls traffic routing), and startup probe (delays other probes until app starts)."

  - id: k8s-pod-resource-limits-001
    type: flashcard
    topic: kubernetes
    tier: L1
    tags: [pods, resources]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    front: "What is the difference between resource requests and limits in a Pod spec?"
    back: "Requests are the minimum resources guaranteed to the container. Limits are the maximum resources the container can use before being throttled (CPU) or killed (memory)."

  - id: k8s-pod-describe-cmd-001
    type: command-fill
    topic: kubernetes
    tier: L1
    tags: [kubectl, pods]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    prompt: "Show detailed information about a pod named 'web-app' in the default namespace"
    command: "kubectl describe pod web-app"
    accept_partial: true

  - id: k8s-pod-logs-cmd-001
    type: command-fill
    topic: kubernetes
    tier: L1
    tags: [kubectl, pods, logs]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    prompt: "View logs from a specific container named 'nginx' inside pod 'web-app'"
    command: "kubectl logs web-app -c nginx"
    accept_partial: true

  - id: k8s-pod-exec-cmd-001
    type: command-fill
    topic: kubernetes
    tier: L1
    tags: [kubectl, pods]
