    accept_partial: true

  # ============================================================
  # L1 -- Deployments/ReplicaSets (3 flashcard + 2 command-fill)
  # ============================================================

  - id: k8s-deploy-strategy-001
    type: flashcard
    topic: kubernetes
    tier: L1
    tags: [deployments, strategy]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    front: "What are the two deployment strategies in Kubernetes?"
    back: "RollingUpdate (default) -- replaces pods gradually. Recreate -- terminates all old pods before creating new ones."

  - id: k8s-replicaset-purpose-001
    type: flashcard
    topic: kubernetes
    tier: L1
    tags: [replicasets]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    front: "What is the purpose of a ReplicaSet?"
    back: "A ReplicaSet ensures that a specified number of pod replicas are running at any given time. Deployments manage ReplicaSets automatically."

  - id: k8s-deploy-maxsurge-001
    type: flashcard
    topic: kubernetes
    tier: L1
    tags: [deployments, rolling-update]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    front: "What do maxSurge and maxUnavailable control in a RollingUpdate strategy?"
    back: "maxSurge sets the maximum number of extra pods created above the desired count. maxUnavailable sets the maximum number of pods that can be unavailable during the update."

  - id: k8s-deploy-rollout-cmd-001
    type: command-fill
    topic: kubernetes
    tier: L1
    tags: [kubectl, deployments]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    prompt: "Check the rollout status of a deployment named 'api-server'"
    command: "kubectl rollout status deployment/api-server"
    accept_partial: true

  - id: k8s-deploy-rollback-cmd-001
    type: command-fill
    topic: kubernetes
    tier: L1
    tags: [kubectl, deployments]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    prompt: "Roll back a deployment named 'api-server' to its previous revision"
    command: "kubectl rollout undo deployment/api-server"
    accept_partial: true

  # ============================================================
  # L1 -- Services/Networking (3 flashcard + 2 command-fill)
  # ============================================================

  - id: k8s-svc-types-001
    type: flashcard
    topic: kubernetes
    tier: L1
    tags: [services, networking]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    front: "What are the four Kubernetes Service types?"
    back: "ClusterIP (default, internal only), NodePort (exposes on each node's IP at a static port), LoadBalancer (provisions external LB), ExternalName (maps to DNS CNAME)."

  - id: k8s-ingress-purpose-001
    type: flashcard
    topic: kubernetes
    tier: L1
    tags: [ingress, networking]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    front: "What is the purpose of an Ingress resource?"
    back: "An Ingress provides HTTP/HTTPS routing rules to expose multiple services under a single external IP, with support for host-based and path-based routing, and TLS termination."

  - id: k8s-dns-svc-001
    type: flashcard
    topic: kubernetes
    tier: L1
    tags: [services, dns]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    front: "How does Kubernetes DNS resolve service names?"
    back: "CoreDNS creates DNS records for each Service. Pods can reach a service via <service-name>.<namespace>.svc.cluster.local or just <service-name> within the same namespace."

  - id: k8s-svc-expose-cmd-001
    type: command-fill
    topic: kubernetes
    tier: L1
    tags: [kubectl, services]
    version_tag: k8s-1.29
    last_verified: "2026-01-01"
    prompt: "Expose a deployment named 'frontend' as a NodePort service on port 80"
    command: "kubectl expose deployment frontend --type=NodePort --port=80"
    accept_partial: true

  - id: k8s-svc-endpoints-cmd-001
    type: command-fill
    topic: kubernetes
