questions:
  # ============================================================
  # ORIGINAL 6 QUESTIONS (preserved verbatim)
  # ============================================================

  - id: tf-init-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [basics, workflow]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "What does `terraform init` do?"
    back: "Initializes the working directory: downloads providers, sets up backend, and prepares modules."

  - id: tf-plan-apply-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [workflow]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "What is the difference between `terraform plan` and `terraform apply`?"
    back: "`plan` shows what changes will be made without making them. `apply` executes the changes."

  - id: tf-state-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [state]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "What does Terraform state track?"
    back: "The mapping between your Terraform configuration and real-world infrastructure resources."

  - id: tf-destroy-cmd-001
    type: command-fill
    topic: terraform
    tier: L1
    tags: [workflow, commands]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    prompt: "Destroy all Terraform-managed infrastructure without interactive confirmation"
    command: "terraform destroy -auto-approve"
    accept_partial: false

  - id: tf-drift-scenario-001
    type: scenario
    topic: terraform
    tier: L2
    tags: [state, drift]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    situation: "A teammate manually changed an AWS security group that is managed by Terraform."
    question: "What happens on the next `terraform plan` and how do you resolve it?"
    answer: "terraform plan detects drift and shows the manual change as a diff. Run terraform apply to revert to declared state, or update the Terraform config to match the manual change and import if needed."
    explanation: "Terraform compares the actual resource state (from AWS) against the state file. Manual changes create drift visible in plan output."

  - id: tf-provider-concept-001
    type: explain-concept
    topic: terraform
    tier: L1
    tags: [providers, architecture]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    concept: "Terraform providers"
    model_answer: "Providers are plugins that implement resource types for a specific platform (AWS, Azure, GCP, etc.). Each provider authenticates with its platform's API and translates Terraform resource definitions into API calls."

  # ============================================================
  # L1 -- Core Workflow (3 new: 2 flashcard + 1 command-fill)
  # ============================================================

  - id: tf-validate-cmd-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [workflow, validation]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "What does `terraform validate` check?"
    back: "It checks the syntax and internal consistency of Terraform configuration files without accessing remote state or APIs."

  - id: tf-fmt-purpose-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [workflow, formatting]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "What does `terraform fmt` do and what flag checks formatting without modifying files?"
    back: "`terraform fmt` rewrites .tf files to the canonical format. The `-check` flag returns a non-zero exit code if files need formatting, without modifying them."

  - id: tf-plan-save-cmd-001
    type: command-fill
    topic: terraform
    tier: L1
    tags: [workflow, commands]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    prompt: "Generate a Terraform plan and save it to a binary file named 'tfplan' for later apply"
    command: "terraform plan -out=tfplan"
    accept_partial: false

  # ============================================================
  # L1 -- State Management (5: 3 flashcard + 2 command-fill)
  # ============================================================

  - id: tf-state-remote-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [state, remote]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "Why should Terraform state be stored remotely instead of locally?"
    back: "Remote state enables team collaboration (shared access), state locking (prevents concurrent writes), and durability (backed by reliable storage like S3 or GCS)."

  - id: tf-state-locking-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [state, locking]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "How does Terraform prevent two team members from modifying state simultaneously?"
    back: "State locking. When using a backend that supports it (e.g., S3 with DynamoDB), Terraform acquires a lock before writing state and releases it when done."

  - id: tf-state-sensitive-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [state, security]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "Why is the Terraform state file considered sensitive?"
    back: "The state file contains all resource attributes including secrets like database passwords and API keys in plain text. It should be encrypted at rest and access-controlled."

  - id: tf-state-list-cmd-001
    type: command-fill
    topic: terraform
    tier: L1
    tags: [state, commands]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    prompt: "List all resources currently tracked in the Terraform state"
    command: "terraform state list"
    accept_partial: false

  - id: tf-state-show-cmd-001
    type: command-fill
    topic: terraform
    tier: L1
    tags: [state, commands]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    prompt: "Show the attributes of a specific resource 'aws_instance.web' in the Terraform state"
    command: "terraform state show aws_instance.web"
    accept_partial: false

  # ============================================================
  # L1 -- Variables/Outputs (3 flashcard + 2 command-fill)
  # ============================================================

  - id: tf-variable-types-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [variables, types]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "What are the three ways to pass variable values to Terraform?"
    back: "1) Command-line flags: -var 'name=value'. 2) Variable files: -var-file or auto-loaded .tfvars files. 3) Environment variables: TF_VAR_name."

  - id: tf-locals-purpose-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [variables, locals]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "What is the difference between variables and locals in Terraform?"
    back: "Variables are input parameters set by the caller (user or module consumer). Locals are computed intermediate values defined within the module, not exposed as inputs."

  - id: tf-output-sensitive-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [outputs, security]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "What does the `sensitive = true` attribute do on a Terraform output?"
    back: "It prevents the output value from being displayed in CLI output and logs. The value is still stored in the state file."

  - id: tf-output-cmd-001
    type: command-fill
    topic: terraform
    tier: L1
    tags: [outputs, commands]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    prompt: "Display the value of a specific Terraform output named 'api_endpoint'"
    command: "terraform output api_endpoint"
    accept_partial: false

  - id: tf-var-file-cmd-001
    type: command-fill
    topic: terraform
    tier: L1
    tags: [variables, commands]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    prompt: "Run terraform plan using a specific variable file named 'prod.tfvars'"
    command: "terraform plan -var-file=prod.tfvars"
    accept_partial: false

  # ============================================================
  # L1 -- Modules (3 flashcard + 2 command-fill)
  # ============================================================

  - id: tf-module-sources-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [modules, sources]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "What are the main module source types Terraform supports?"
    back: "Local paths (./modules/vpc), Terraform Registry (hashicorp/consul/aws), GitHub URLs (github.com/org/repo), S3 buckets, and GCS buckets."

  - id: tf-module-versioning-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [modules, versioning]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "How do you pin a Terraform module to a specific version from the registry?"
    back: "Use the `version` argument in the module block: `version = \"~> 3.0\"`. This accepts any 3.x version. Exact pinning: `version = \"3.2.1\"`."

  - id: tf-module-variables-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [modules, variables]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "How are values passed into and out of a Terraform module?"
    back: "Values are passed in via module arguments that map to the child module's variable declarations. Values come out via the child module's outputs, accessed as module.<name>.<output>."

  - id: tf-module-init-cmd-001
    type: command-fill
    topic: terraform
    tier: L1
    tags: [modules, commands]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    prompt: "Download and update modules after changing a module source or version"
    command: "terraform init -upgrade"
    accept_partial: false

  - id: tf-module-graph-cmd-001
    type: command-fill
    topic: terraform
    tier: L1
    tags: [modules, commands]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    prompt: "Generate a visual dependency graph of all Terraform resources and modules"
    command: "terraform graph"
    accept_partial: true

  # ============================================================
  # L1 -- Providers/Resources (3 flashcard + 2 command-fill)
  # ============================================================

  - id: tf-resource-lifecycle-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [resources, lifecycle]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "What do the lifecycle arguments `create_before_destroy` and `prevent_destroy` do?"
    back: "`create_before_destroy` creates the replacement resource before deleting the old one (reduces downtime). `prevent_destroy` causes Terraform to reject any plan that would destroy the resource."

  - id: tf-count-foreach-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [resources, iteration]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "What is the difference between `count` and `for_each` in Terraform resources?"
    back: "`count` creates N identical resources indexed by number (count.index). `for_each` creates one resource per item in a map or set, indexed by key (each.key, each.value). `for_each` is preferred because removing an item does not shift indexes."

  - id: tf-depends-on-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [resources, dependencies]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "When should you use `depends_on` in Terraform?"
    back: "Only when Terraform cannot infer the dependency from resource references. Common case: a resource depends on a side effect (e.g., IAM policy attachment must complete before an ECS service starts)."

  - id: tf-taint-cmd-001
    type: command-fill
    topic: terraform
    tier: L1
    tags: [resources, commands]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    prompt: "Mark an AWS EC2 instance named 'aws_instance.web' for replacement on the next apply"
    command: "terraform taint aws_instance.web"
    accept_partial: false

  - id: tf-providers-cmd-001
    type: command-fill
    topic: terraform
    tier: L1
    tags: [providers, commands]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    prompt: "List all providers required by the current Terraform configuration"
    command: "terraform providers"
    accept_partial: true

  # ============================================================
  # L1 -- Backends/Workspaces (2 flashcard + 2 command-fill)
  # ============================================================

  - id: tf-s3-backend-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [backends, s3]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "What AWS resources are needed for a Terraform S3 backend with state locking?"
    back: "An S3 bucket for storing the state file and a DynamoDB table for state locking. The DynamoDB table must have a partition key named 'LockID' of type String."

  - id: tf-workspace-purpose-001
    type: flashcard
    topic: terraform
    tier: L1
    tags: [workspaces]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    front: "What are Terraform workspaces and what is the default workspace?"
    back: "Workspaces allow managing multiple distinct state files from the same configuration directory. The default workspace is named 'default' and cannot be deleted."

  - id: tf-workspace-new-cmd-001
    type: command-fill
    topic: terraform
    tier: L1
    tags: [workspaces, commands]
    version_tag: tf-1.7
    last_verified: "2026-01-01"
    prompt: "Create a new Terraform workspace named 'staging' and switch to it"
    command: "terraform workspace new staging"
    accept_partial: false

  - id: tf-workspace-select-cmd-001
