  - id: k8s-taint-effect-explain-001
    type: explain-concept
    topic: kubernetes
    tier: L2
    tags: [pods, taints, tolerations, scheduling]
    version_tag: k8s-1.29
    last_verified: "2026-03-18"
    concept: "Explain the difference between NoSchedule and NoExecute taint effects"
    model_answer: "NoSchedule prevents new pods from being scheduled on the tainted node unless they have a matching toleration, but existing pods already running on the node are not affected. NoExecute is stricter — it evicts existing pods that do not tolerate the taint and prevents new pods without a matching toleration from scheduling. NoExecute can optionally include a tolerationSeconds field that allows a pod to remain on the node for a limited time before eviction."

  # --- L3: Scenario ---

  - id: k8s-pod-yaml-debug-l3-001
    type: scenario
    topic: kubernetes
    tier: L3
    tags: [incident, pods, yaml, debugging, scheduling]
    version_tag: k8s-1.29
    last_verified: "2026-03-18"
    situation: |
      A pod named 'techops-pod' is stuck in Pending state. kubectl describe pod shows:
        Events:
          Warning  FailedScheduling  0/5 nodes are available: 2 node(s) had taint {special-taint: true}, 3 node(s) didn't match Pod's node affinity/selector.
      The pod spec has nodeSelector: {disktype: ssd} and no tolerations.
      Node inventory: 3 nodes without SSD labels, 2 nodes with disktype=ssd but also tainted with 'special-taint=true:NoSchedule'.
    question: "Diagnose why the pod cannot schedule and provide the minimal fix."
    answer: "The pod requires nodes with label disktype=ssd (nodeSelector), but the only 2 nodes with that label have a taint 'special-taint=true:NoSchedule'. Since the pod has no tolerations, it cannot schedule on any node. Fix: add a toleration to the pod spec — tolerations: [{key: 'special-taint', operator: 'Equal', value: 'true', effect: 'NoSchedule'}]. Alternatively, label an untainted node with disktype=ssd."
    explanation: "Scheduling requires BOTH nodeSelector labels to match AND all node taints to be tolerated. When nodes matching the selector are tainted, the pod needs tolerations for those taints. This is a common issue when dedicated node pools (e.g., SSD nodes) are also tainted to restrict general workloads."
